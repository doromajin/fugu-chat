<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>FuguChat</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

    :root {
      --bg:      #0a0a0a;
      --surface: #141414;
      --input-bg:#1c1c1c;
      --border:  #2a2a2a;
      --accent:  #00d4ff;
      --user-bg: #1a3a52;
      --text:    #f0f0f0;
      --muted:   #666;
      --danger:  #ff4d6d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 15px; line-height: 1.6; overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 680px; margin: 0 auto; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; padding-top: max(10px, env(safe-area-inset-top));
      background: var(--bg); flex-shrink: 0; z-index: 10;
    }
    .hdr-btn {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: var(--surface); color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; transition: background 0.15s;
    }
    .hdr-btn:active { background: #222; }
    /* incognito mode */
    .hdr-btn.incognito-active {
      background: #1e1e1e;
      color: var(--text);
    }
    .hdr-btn.incognito-active .incognito-svg { opacity: 1 !important; }
    .hdr-btn .incognito-svg { opacity: 0.5; }

    .incognito-banner {
      display: none;
      background: #111;
      border-bottom: 1px solid #222;
      padding: 10px 16px;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .incognito-banner.visible { display: flex; }
    .incognito-banner .ib-icon {
      width: 32px; height: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .incognito-banner .ib-body { flex: 1; }
    .incognito-banner .ib-title {
      font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1px;
    }
    .incognito-banner .ib-sub {
      font-size: 11px; color: var(--muted); line-height: 1.4;
    }
    .incognito-banner .ib-end {
      font-size: 12px; font-weight: 500; color: var(--muted);
      cursor: pointer; padding: 6px 14px;
      border: 1px solid #2a2a2a; border-radius: 20px;
      background: transparent; font-family: inherit;
      transition: border-color 0.15s, color 0.15s; flex-shrink: 0;
    }
    .incognito-banner .ib-end:active { color: var(--text); border-color: #444; }

    body.incognito { background: #080808; }
    body.incognito #app { background: #080808; }
    body.incognito header { background: #080808; }
    body.incognito .input-pill { background: #111; border-color: #252525; }
    body.incognito .msg.user .bubble { background: #1c1c1c; }

    .hdr-center {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px 5px 10px; cursor: pointer;
    }
    .hdr-center .fish { display: flex; align-items: center; line-height: 1; }
    .hdr-center .model-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .hdr-center .chevron { font-size: 10px; color: var(--muted); margin-left: 2px; }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 8px 16px 16px;
      display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { display: none; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 40px 24px;
    }
    .empty-icon { font-size: 52px; filter: drop-shadow(0 0 16px rgba(229,57,53,0.4)); animation: float 3s ease-in-out infinite; display: flex; align-items: center; justify-content: center; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .empty-state h2 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .empty-state p { font-size: 14px; color: var(--muted); max-width: 240px; line-height: 1.5; }

    .msg { display: flex; flex-direction: column; animation: fadeUp 0.2s ease; margin: 3px 0; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-items: flex-end; }
    .msg.ai   { align-items: flex-start; }

    .bubble { max-width: 78%; padding: 10px 14px; font-size: 15px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
    .msg.user .bubble { background: var(--user-bg); border-radius: 18px 18px 4px 18px; color: var(--text); }
    .msg.ai .bubble   { background: transparent; border-radius: 0; padding-left: 0; color: var(--text); }

    .ai-name { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 4px; padding-left: 2px; letter-spacing: 0.3px; display: flex; align-items: center; }

    .typing-dots { display: flex; gap: 5px; padding: 10px 2px; }
    .typing-dots span { width: 8px; height: 8px; background: var(--muted); border-radius: 50%; animation: blink 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.25; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1); } }

    .error-msg { font-size: 13px; color: var(--danger); padding: 8px 12px; background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); border-radius: 10px; margin: 4px 0; }
    .bubble-img { max-width: 100%; max-height: 200px; border-radius: 12px; display: block; margin-bottom: 6px; object-fit: contain; }

    /* ── Input area ── */
    #input-area { padding: 8px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom)); background: var(--bg); flex-shrink: 0; }
    .img-preview-bar { display: none; gap: 8px; padding: 0 4px 8px; flex-wrap: wrap; }
    .img-preview-bar.has-images { display: flex; }
    .img-thumb { position: relative; width: 60px; height: 60px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; }
    .img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-thumb .remove-img { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: rgba(0,0,0,0.75); border: none; border-radius: 50%; color: #fff; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .input-pill { display: flex; align-items: flex-end; background: var(--input-bg); border: 1px solid var(--border); border-radius: 26px; padding: 6px 6px 6px 14px; }
    .input-pill:focus-within { border-color: #444; }
    .plus-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 300; flex-shrink: 0; margin-right: 6px; transition: color 0.15s; align-self: flex-end; margin-bottom: 1px; }
    .plus-btn:active { color: var(--text); }
    textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; font-family: inherit; line-height: 1.5; resize: none; max-height: 130px; min-height: 24px; padding: 4px 0; }
    textarea::placeholder { color: var(--muted); }
    .send-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--accent); color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; font-weight: 700; transition: opacity 0.2s, transform 0.1s; align-self: flex-end; }
    .send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .send-btn:not(:disabled):active { transform: scale(0.92); }

    /* ── Sidebar (history drawer) ── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
    }
    .sidebar-overlay.open { display: block; }
    .sidebar-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,0.55);
    }
    .sidebar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: min(300px, 82vw);
      background: var(--surface);
      display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(.32,.72,0,1);
      z-index: 1;
    }
    .sidebar-overlay.open .sidebar { transform: translateX(0); }

    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 12px;
      padding-top: max(16px, env(safe-area-inset-top));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700; color: var(--text);
    }
    .new-chat-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--input-bg);
      color: var(--text); font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: border-color 0.15s;
    }
    .new-chat-btn:active { background: #222; }

    .history-list {
      flex: 1; overflow-y: auto; padding: 8px 8px;
      -webkit-overflow-scrolling: touch;
    }
    .history-list::-webkit-scrollbar { display: none; }

    .history-section-label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 10px 8px 4px;
    }

    .history-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 10px; border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
      position: relative;
    }
    .history-item:active { background: #1e1e1e; }
    .history-item.active { background: #1a1a1a; }

    .history-item .hi-text {
      flex: 1; overflow: hidden;
    }
    .history-item .hi-title {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-item .hi-date {
      font-size: 11px; color: var(--muted); margin-top: 1px;
    }
    .history-item .hi-delete {
      opacity: 0; width: 24px; height: 24px;
      border-radius: 50%; border: none; background: transparent;
      color: var(--muted); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s, color 0.15s;
    }
    .history-item:hover .hi-delete,
    .history-item.active .hi-delete { opacity: 1; }
    .history-item .hi-delete:hover { color: var(--danger); }

    .sidebar-footer {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-settings-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 8px; border-radius: 10px;
      border: none; background: transparent; color: var(--muted);
      font-size: 14px; cursor: pointer; font-family: inherit;
      transition: color 0.15s;
    }
    .sidebar-settings-btn:active { color: var(--text); }

    /* ── Shared sheet styles ── */
    .sheet-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 300;
      align-items: flex-end; justify-content: center;
    }
    .sheet-overlay.open { display: flex; }
    .sheet { border-radius: 20px 20px 0 0; padding: 20px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); width: 100%; max-width: 680px; animation: slideUp 0.25s cubic-bezier(.32,.72,0,1); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle { width: 36px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 18px; }
    .sheet-title { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 10px; padding: 0 4px; }

    /* model picker */
    .model-sheet-bg { background: var(--surface); }
    .model-option { display: flex; align-items: center; gap: 12px; padding: 14px 12px; border-radius: 14px; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; }
    .model-option:active { background: #1e1e1e; }
    .model-option.selected { background: #1a1a1a; border-color: var(--border); }
    .model-option .mo-icon { font-size: 26px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: #1e1e1e; border-radius: 12px; flex-shrink: 0; }
    .model-option .mo-info { flex: 1; }
    .model-option .mo-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .model-option .mo-desc { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .model-option .mo-check { color: var(--accent); font-size: 18px; opacity: 0; }
    .model-option.selected .mo-check { opacity: 1; }

    /* settings sheet */
    .settings-sheet-bg { background: var(--surface); }
    .settings-sheet-bg h3 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .field input, .field textarea.sys-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 10px 13px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
    .field textarea.sys-input { resize: vertical; min-height: 68px; max-height: 120px; line-height: 1.5; }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .field .hint a { color: var(--accent); text-decoration: none; }
    .sheet-actions { display: flex; gap: 8px; margin-top: 18px; }
    .btn-primary { flex: 1; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-secondary { padding: 13px 18px; background: var(--input-bg); color: var(--muted); border: 1px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; cursor: pointer; }

    .empty-history {
      text-align: center; padding: 40px 16px;
      font-size: 13px; color: var(--muted); line-height: 1.6;
    }
    .empty-history .eh-icon { font-size: 28px; margin-bottom: 8px; }

    /* ── Desktop layout (≥768px) ── */
    @media (min-width: 768px) {
      html, body { overflow: hidden; }

      /* root layout: sidebar + main side by side */
      #desktop-root {
        display: flex;
        height: 100dvh;
        width: 100%;
      }

      /* sidebar toggleable on desktop */
      .sidebar-overlay { position: static; z-index: auto; overflow: hidden; }
      .sidebar-overlay.open { display: block; }
      .sidebar-backdrop { display: none; }
      .sidebar {
        position: static;
        width: 260px;
        flex-shrink: 0;
        transform: none !important;
        transition: none;
        border-right: 1px solid var(--border);
        height: 100dvh;
      }
      /* collapsed: sidebar-overlay hidden = zero width */
      #desktop-root { transition: none; }
      .sidebar-overlay:not(.open) { display: none; }
      .sidebar-header { padding-top: 16px; }
      .sidebar-footer { padding-bottom: 12px; }
      /* show hamburger on desktop too */
      .hdr-hamburger { display: flex !important; }

      /* main area fills rest */
      #app {
        flex: 1;
        max-width: none;
        height: 100dvh;
        min-width: 0;
      }

      /* header: tighter on desktop */
      header { padding-top: 10px; border-bottom: 1px solid var(--border); }

      /* hide hamburger on desktop (sidebar always open) */
      .hdr-hamburger { display: none; }

      /* input: slightly wider max */
      #input-area { padding: 12px 20px 16px; }
      .input-pill { border-radius: 14px; max-width: 760px; margin: 0 auto; }

      /* messages: wider comfortable reading */
      #messages { padding: 16px 24px 20px; }
      .bubble { max-width: 70%; }

      /* scrollbar visible on desktop */
      #messages::-webkit-scrollbar { display: block; width: 4px; }
      #messages::-webkit-scrollbar-track { background: transparent; }
      #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      /* sheets stay centered */
      .sheet-overlay { z-index: 300; }

      /* hover states for desktop */
      .hdr-btn:hover { background: #222; }
      .history-item:hover { background: #1a1a1a; }
      .history-item:hover .hi-delete { opacity: 1; }
      .new-chat-btn:hover { border-color: #444; }
      .model-option:hover { background: #1e1e1e; }
    }

    @media (min-width: 1024px) {
      .sidebar { width: 280px; }
      .bubble { max-width: 65%; }
    }

    /* ── Message actions ── */
    .msg-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .msg:hover .msg-meta { opacity: 1; }
    /* always show on mobile (no hover) */
    @media (hover: none) { .msg-meta { opacity: 1; } }

    .msg-time {
      font-size: 11px;
      color: var(--muted);
    }
    .msg-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .msg-action-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      padding: 0;
    }
    .msg-action-btn:hover { color: var(--text); background: #1e1e1e; }
    .msg-action-btn.copied { color: #4ade80; }

    /* align meta to right for user, left for ai */
    .msg.user .msg-meta { flex-direction: row-reverse; }
    .msg.ai .msg-meta { flex-direction: row; }

    /* ── Drag & Drop ── */
    .drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      pointer-events: none;
    }
    .drop-overlay.active {
      display: flex;
      pointer-events: all;
    }
    .drop-box {
      border: 2px dashed #555;
      border-radius: 20px;
      padding: 48px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s;
    }
    .drop-overlay.over .drop-box {
      border-color: var(--accent);
    }
    .drop-box svg { opacity: 0.6; }
    .drop-box p { font-size: 15px; color: var(--muted); }
    .drop-overlay.over .drop-box p { color: var(--accent); }

    /* ── Quote reply ── */
    .quote-popup {
      position: fixed;
      z-index: 400;
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .quote-popup.visible { display: flex; }
    .quote-popup-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border: none; background: transparent;
      color: var(--text); font-size: 13px; font-family: inherit;
      cursor: pointer; border-radius: 7px; white-space: nowrap;
      transition: background 0.15s;
    }
    .quote-popup-btn:hover { background: var(--input-bg); }

    /* quote preview in input area */
    .quote-preview {
      display: none;
      margin: 0 4px 6px;
      padding: 8px 12px;
      background: var(--input-bg);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      font-size: 13px;
      color: var(--muted);
      position: relative;
    }
    .quote-preview.visible { display: block; }
    .quote-preview .qp-text {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: calc(100% - 24px);
    }
    .quote-preview .qp-close {
      position: absolute; top: 6px; right: 8px;
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; font-size: 14px; line-height: 1;
    }
  </style>
</head>
<body>
<div id="desktop-root">

<!-- Sidebar (moved before app for desktop layout) -->
<div class="sidebar-overlay" id="sidebar-overlay">
  <div class="sidebar-backdrop" onclick="closeSidebar()"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">FuguChat</span>
      <button class="new-chat-btn" onclick="newChat()">＋ 新しい会話</button>
    </div>
    <div class="history-list" id="history-list"></div>
    <div class="sidebar-footer">
      <button class="sidebar-settings-btn" onclick="closeSidebar(); openSettings();">
        ⚙️ 設定
      </button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <button class="hdr-btn hdr-hamburger" onclick="toggleSidebar()">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <rect width="18" height="2" rx="1" fill="currentColor"/>
        <rect y="6" width="18" height="2" rx="1" fill="currentColor"/>
        <rect y="12" width="18" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>
    <div class="hdr-center" onclick="openModelPicker()">
      <span class="fish"><svg width="26" height="26" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- round fish body facing right -->
  <path d="M10 24 C10 14 18 8 28 10 C36 12 40 18 40 24 C40 30 36 36 28 38 C18 40 10 34 10 24Z"

<script>
  // ── State ──
  let model = 'fugu';
  let messages = [];
  let isLoading = false;
  let pendingImages = [];
  let currentChatId = null;
  let isIncognito = false;


  // ── History storage ──
  function loadAllChats() {
    try { return JSON.parse(localStorage.getItem('fugu_chats') || '[]'); } catch { return []; }
  }
  function saveAllChats(chats) {
    localStorage.setItem('fugu_chats', JSON.stringify(chats));
  }
  function saveCurrentChat() {
    if (messages.length === 0 || isIncognito) return;
    const chats = loadAllChats();
    const idx = chats.findIndex(c => c.id === currentChatId);
    const firstUserMsg = messages.find(m => m.role === 'user');
    let title = '新しい会話';
    if (firstUserMsg) {
      const content = typeof firstUserMsg.content === 'string'
        ? firstUserMsg.content
        : (firstUserMsg.content.find(b => b.type === 'text')?.text || '画像のみ');
      title = content.slice(0, 40) + (content.length > 40 ? '…' : '');
    }
    const entry = { id: currentChatId, title, updatedAt: Date.now(), model, messages };
    if (idx >= 0) chats[idx] = entry;
    else chats.unshift(entry);
    saveAllChats(chats);
    localStorage.setItem('fugu_last_chat_id', currentChatId);
  }
  function deleteChatById(id) {
    const chats = loadAllChats().filter(c => c.id !== id);
    saveAllChats(chats);
    if (id === currentChatId) newChat();
    renderHistoryList();
  }

  // ── Incognito ──
  function toggleIncognito() {
    isIncognito = !isIncognito;
    document.body.classList.toggle('incognito', isIncognito);
    const btn = document.getElementById('incognito-btn');
    btn.classList.toggle('incognito-active', isIncognito);
    const svg = btn.querySelector('.incognito-svg');
    if (svg) svg.style.opacity = isIncognito ? '1' : '0.55';
    document.getElementById('incognito-banner').classList.toggle('visible', isIncognito);
    // Start fresh incognito session
    if (isIncognito) {
      saveCurrentChat();
      currentChatId = 'incognito_' + Date.now();
      messages = [];
      pendingImages = [];
      renderImagePreviews();
      document.getElementById('messages').querySelectorAll('.msg, .error-msg').forEach(el => el.remove());
      document.getElementById('empty').style.display = 'flex';
      updateSendBtn();
    } else {
      // Exit incognito → new normal chat
      currentChatId = 'chat_' + Date.now();
      messages = [];
      pendingImages = [];
      renderImagePreviews();
      document.getElementById('messages').querySelectorAll('.msg, .error-msg').forEach(el => el.remove());
      document.getElementById('empty').style.display = 'flex';
      updateSendBtn();
    }
  }

  // ── Sidebar ──
  function isDesktop() { return window.innerWidth >= 768; }
  function openSidebar() {
    renderHistoryList();
    document.getElementById('sidebar-overlay').classList.add('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
  function toggleSidebar() {
    const overlay = document.getElementById('sidebar-overlay');
    if (overlay.classList.contains('open')) {
      closeSidebar();
    } else {
      openSidebar();
    }
  }

  function renderHistoryList() {
    const container = document.getElementById('history-list');
    const chats = loadAllChats();
    if (chats.length === 0) {
      container.innerHTML = '<div class="empty-history"><div class="eh-icon">💬</div>まだ会話がありません</div>';
      return;
    }
    // Group by date
    const now = new Date();
    const groups = { '今日': [], '昨日': [], '過去7日': [], 'それ以前': [] };
    chats.forEach(c => {
      const d = new Date(c.updatedAt);
      const diffDays = Math.floor((now - d) / 86400000);
      if (diffDays === 0) groups['今日'].push(c);
      else if (diffDays === 1) groups['昨日'].push(c);
      else if (diffDays < 7) groups['過去7日'].push(c);
      else groups['それ以前'].push(c);
    });

    container.innerHTML = '';
    for (const [label, items] of Object.entries(groups)) {
      if (items.length === 0) continue;
      const sec = document.createElement('div');
      sec.className = 'history-section-label';
      sec.textContent = label;
      container.appendChild(sec);
      items.forEach(c => {
        const item = document.createElement('div');
        item.className = 'history-item' + (c.id === currentChatId ? ' active' : '');
        item.innerHTML = `
          <div class="hi-text">
            <div class="hi-title">${escHtml(c.title)}</div>
            <div class="hi-date">${formatDate(c.updatedAt)}</div>
          </div>
          <button class="hi-delete" onclick="event.stopPropagation(); deleteChatById('${c.id}')">🗑</button>
        `;
        item.addEventListener('click', () => loadChat(c.id));
        container.appendChild(item);
      });
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatDate(ts) {
    const d = new Date(ts);
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    return `${d.getMonth()+1}/${d.getDate()} ${h}:${m}`;
  }

  function loadChat(id) {
    const chats = loadAllChats();
    const chat = chats.find(c => c.id === id);
    if (!chat) return;
    currentChatId = chat.id;
    messages = chat.messages;
    if (chat.model) { model = chat.model; document.getElementById('hdr-model-name').textContent = model === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu'; }
    localStorage.setItem('fugu_last_chat_id', currentChatId);
    rerenderMessages();
    closeSidebar();
  }

  function rerenderMessages() {
    const container = document.getElementById('messages');
    container.querySelectorAll('.msg, .error-msg').forEach(el => el.remove());
    const empty = document.getElementById('empty');
    if (messages.length === 0) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';
    messages.forEach(m => {
      if (m.role === 'user') {
        // reconstruct user bubble
        const images = [];
        let text = '';
        if (typeof m.content === 'string') { text = m.content; }
        else {
          m.content.forEach(b => {
            if (b.type === 'text') text = b.text;
            if (b.type === 'image_url') images.push({ previewUrl: b.image_url.url });
          });
        }
        appendUserBubble(text, images, false);
      } else if (m.role === 'assistant') {
        appendAIBubble(typeof m.content === 'string' ? m.content : '', m.model || model, false);
      }
    });

    // 履歴を開いた時は一番下にスクロール
    requestAnimationFrame(() => {
      const container = document.getElementById('messages');
      container.scrollTop = container.scrollHeight;
    });
    updateSendBtn();
  }

  // ── New chat ──
  function newChat() {
    saveCurrentChat();
    currentChatId = 'chat_' + Date.now();
    messages = [];
    pendingImages = [];
    renderImagePreviews();
    document.getElementById('messages').querySelectorAll('.msg, .error-msg').forEach(el => el.remove());
    document.getElementById('empty').style.display = 'flex';
    updateSendBtn();
    closeSidebar();
  }

  // ── Model picker ──
  function openModelPicker() {
    document.getElementById('opt-fugu').classList.toggle('selected', model === 'fugu');
    document.getElementById('opt-ultra').classList.toggle('selected', model === 'fugu-ultra');
    document.getElementById('model-sheet').classList.add('open');
  }
  function selectModel(m) {
    model = m;
    document.getElementById('hdr-model-name').textContent = m === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu';
    closeSheet('model-sheet');
  }

  // ── Settings ──
  function openSettings() {
    document.getElementById('api-key-input').value = localStorage.getItem('fugu_api_key') || '';
    document.getElementById('base-url-input').value = localStorage.getItem('fugu_base_url') || '';
    document.getElementById('sys-prompt-input').value = localStorage.getItem('fugu_sys_prompt') || '';
    document.getElementById('settings-sheet').classList.add('open');
  }
  function saveSettings() {
    const key = document.getElementById('api-key-input').value.trim();
    const url = document.getElementById('base-url-input').value.trim();
    const sys = document.getElementById('sys-prompt-input').value.trim();
    if (key) localStorage.setItem('fugu_api_key', key);
    if (url) localStorage.setItem('fugu_base_url', url);
    localStorage.setItem('fugu_sys_prompt', sys);
    closeSheet('settings-sheet');
    updateSendBtn();
  }

  // ── Sheet helpers ──
  function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
  function closeOnOverlay(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

  // ── Input ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
    updateSendBtn();
  }
  function updateSendBtn() {
    const val = document.getElementById('user-input').value.trim();
    const hasKey = !!localStorage.getItem('fugu_api_key');
    document.getElementById('send-btn').disabled = (!val && pendingImages.length === 0 && !quotedText) || !hasKey || isLoading;
  }
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!document.getElementById('send-btn').disabled) sendMessage();
    }
  }

  // ── Image handling ──
  function handleFileSelect(e) {
    Array.from(e.target.files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        pendingImages.push({ id: Date.now() + Math.random(), base64: dataUrl.split(',')[1], mimeType: file.type, previewUrl: dataUrl });
        renderImagePreviews(); updateSendBtn();
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }
  function removeImage(id) {
    pendingImages = pendingImages.filter(img => img.id !== id);
    renderImagePreviews(); updateSendBtn();
  }
  function renderImagePreviews() {
    const bar = document.getElementById('img-preview-bar');
    bar.innerHTML = '';
    if (pendingImages.length === 0) { bar.classList.remove('has-images'); return; }
    bar.classList.add('has-images');
    pendingImages.forEach(img => {
      const thumb = document.createElement('div'); thumb.className = 'img-thumb';
      const im = document.createElement('img'); im.src = img.previewUrl;
      const btn = document.createElement('button'); btn.className = 'remove-img'; btn.textContent = '✕';
      btn.onclick = () => removeImage(img.id);
      thumb.appendChild(im); thumb.appendChild(btn); bar.appendChild(thumb);
    });
  }

  // ── Render helpers ──

  function smartScroll() {
    const container = document.getElementById('messages');
    const threshold = 120; // px from bottom
    const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
    if (isNearBottom) container.scrollTop = container.scrollHeight;
  }
  function fmtTime(ts) {
    const d = new Date(ts);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function appendUserBubble(text, images, animate = true) {
    const container = document.getElementById('messages');
    document.getElementById('empty').style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg user'; if (!animate) div.style.animation = 'none';

    const bubble = document.createElement('div'); bubble.className = 'bubble';
    images.forEach(img => {
      const im = document.createElement('img'); im.src = img.previewUrl; im.className = 'bubble-img';
      bubble.appendChild(im);
    });
    if (text) { const t = document.createElement('span'); t.textContent = text; bubble.appendChild(t); }

    // meta bar
    const meta = document.createElement('div'); meta.className = 'msg-meta';
    const time = document.createElement('span'); time.className = 'msg-time'; time.textContent = fmtTime(Date.now());
    const actions = document.createElement('div'); actions.className = 'msg-actions';

    // reload btn
    const reloadBtn = document.createElement('button'); reloadBtn.className = 'msg-action-btn';
    reloadBtn.title = '再送'; reloadBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;
    reloadBtn.onclick = () => retrySend(div);

    // edit btn
    const editBtn = document.createElement('button'); editBtn.className = 'msg-action-btn';
    editBtn.title = '編集'; editBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    editBtn.onclick = () => editUserMsg(div, text);

    // copy btn
    const copyBtn = document.createElement('button'); copyBtn.className = 'msg-action-btn';
    copyBtn.title = 'コピー'; copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    copyBtn.onclick = () => copyText(text, copyBtn);

    actions.appendChild(reloadBtn); actions.appendChild(editBtn); actions.appendChild(copyBtn);
    meta.appendChild(time); meta.appendChild(actions);
    div.appendChild(bubble); div.appendChild(meta);
    container.appendChild(div);

  }
  function appendAIBubble(text, modelUsed, animate = true) {
    const container = document.getElementById('messages');
    document.getElementById('empty').style.display = 'none';
    const div = document.createElement('div'); div.className = 'msg ai'; if (!animate) div.style.animation = 'none';
    const name = document.createElement('div'); name.className = 'ai-name';
    name.innerHTML = modelUsed === 'fugu-ultra' ? '⚡ Fugu Ultra' : `<svg width="16" height="16" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 24 C10 14 18 8 28 10 C36 12 40 18 40 24 C40 30 36 36 28 38 C18 40 10 34 10 24Z" stroke="#e53935" stroke-width="3" stroke-linejoin="round" fill="none"/><path d="M10 24 L2 16" stroke="#e53935" stroke-width="3" stroke-linecap="round"/><path d="M10 24 L2 32" stroke="#e53935" stroke-width="3" stroke-linecap="round"/><path d="M22 13 L16 35" stroke="#e53935" stroke-width="2.5" stroke-linecap="round"/><circle cx="32" cy="21" r="2.5" stroke="#e53935" stroke-width="2" fill="none"/></svg>`;
    const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;

    // meta bar
    const meta = document.createElement('div'); meta.className = 'msg-meta';
    const time = document.createElement('span'); time.className = 'msg-time'; time.textContent = fmtTime(Date.now());
    const actions = document.createElement('div'); actions.className = 'msg-actions';

    // reload btn
    const reloadBtn = document.createElement('button'); reloadBtn.className = 'msg-action-btn';
    reloadBtn.title = '再生成'; reloadBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;
    reloadBtn.onclick = () => regenerate();

    // copy btn
    const copyBtn = document.createElement('button'); copyBtn.className = 'msg-action-btn';
    copyBtn.title = 'コピー'; copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    copyBtn.onclick = () => copyText(text, copyBtn);

    actions.appendChild(reloadBtn); actions.appendChild(copyBtn);
    meta.appendChild(time); meta.appendChild(actions);
    div.appendChild(name); div.appendChild(bubble); div.appendChild(meta);
    container.appendChild(div);

  }
  function appendTyping() {
    const container = document.getElementById('messages');
    document.getElementById('empty').style.display = 'none';
    const div = document.createElement('div'); div.className = 'msg ai'; div.id = 'typing-msg';
    const name = document.createElement('div'); name.className = 'ai-name';
    name.innerHTML = model === 'fugu-ultra' ? '⚡ Fugu Ultra' : `<svg width="16" height="16" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 24 C10 14 18 8 28 10 C36 12 40 18 40 24 C40 30 36 36 28 38 C18 40 10 34 10 24Z" stroke="#e53935" stroke-width="3" stroke-linejoin="round" fill="none"/><path d="M10 24 L2 16" stroke="#e53935" stroke-width="3" stroke-linecap="round"/><path d="M10 24 L2 32" stroke="#e53935" stroke-width="3" stroke-linecap="round"/><path d="M22 13 L16 35" stroke="#e53935" stroke-width="2.5" stroke-linecap="round"/><circle cx="32" cy="21" r="2.5" stroke="#e53935" stroke-width="2" fill="none"/></svg>`;
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    div.appendChild(name); div.appendChild(bubble); container.appendChild(div);

  }
  function removeTyping() { const el = document.getElementById('typing-msg'); if (el) el.remove(); }
  function appendError(msg) {
    const container = document.getElementById('messages');
    const div = document.createElement('div'); div.className = 'error-msg';
    div.textContent = '⚠️ ' + msg; container.appendChild(div);

  }

  // ── Message actions ──
  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 1500);
    });
  }

  function editUserMsg(div, oldText) {
    // Find the index of this message in messages array
    const allUserDivs = Array.from(document.querySelectorAll('.msg.user'));
    const idx = allUserDivs.indexOf(div);
    if (idx < 0) return;
    // Put text back in input
    const input = document.getElementById('user-input');
    input.value = oldText;
    autoResize(input);
    input.focus();
    // Remove this message and everything after from state and DOM
    const msgIdx = messages.findIndex((m, i) => {
      const userMsgs = messages.slice(0, i + 1).filter(x => x.role === 'user');
      return userMsgs.length === idx + 1 && m.role === 'user';
    });
    if (msgIdx >= 0) messages.splice(msgIdx);
    // Remove from DOM
    const container = document.getElementById('messages');
    const allMsgs = Array.from(container.querySelectorAll('.msg, .error-msg'));
    // Remove this user msg and everything after
    let found = false;
    allMsgs.forEach(el => {
      if (el === div) found = true;
      if (found) el.remove();
    });
    if (messages.length === 0) document.getElementById('empty').style.display = 'flex';
    updateSendBtn();
  }

  function retrySend(div) {
    // Find last user message and resend
    const lastUser = [...messages].reverse().find(m => m.role === 'user');
    if (!lastUser) return;
    // Remove last assistant message from state and DOM if exists
    if (messages[messages.length - 1]?.role === 'assistant') {
      messages.pop();
      const container = document.getElementById('messages');
      const lastAI = [...container.querySelectorAll('.msg.ai')].pop();
      if (lastAI) lastAI.remove();
    }
    // Remove error messages
    document.querySelectorAll('.error-msg').forEach(e => e.remove());
    resendLastUserMessage();
  }

  async function resendLastUserMessage() {
    const apiKey = localStorage.getItem('fugu_api_key');
    const baseUrl = (localStorage.getItem('fugu_base_url') || 'https://api.sakana.ai/v1').replace(/\/$/, '');
    const sysPrompt = localStorage.getItem('fugu_sys_prompt') || '';
    isLoading = true; updateSendBtn(); appendTyping();
    const reqMessages = [];
    if (sysPrompt) reqMessages.push({ role: 'system', content: sysPrompt });
    reqMessages.push(...messages);
    try {
      const res = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model, messages: reqMessages }),
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '（応答なし）';
      messages.push({ role: 'assistant', content: reply });
      removeTyping(); appendAIBubble(reply, model);
      saveCurrentChat();
    } catch (e) {
      removeTyping(); appendError(e.message);
    } finally {
      isLoading = false; updateSendBtn();
    }
  }

  function regenerate() {
    // Remove last assistant message and resend
    if (messages[messages.length - 1]?.role === 'assistant') {
      messages.pop();
      const container = document.getElementById('messages');
      const lastAI = [...container.querySelectorAll('.msg.ai')].pop();
      if (lastAI) lastAI.remove();
    }
    document.querySelectorAll('.error-msg').forEach(e => e.remove());
    resendLastUserMessage();
  }

  // ── Send ──
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if ((!text && pendingImages.length === 0) || isLoading) return;

    const apiKey = localStorage.getItem('fugu_api_key');
    const baseUrl = (localStorage.getItem('fugu_base_url') || 'https://api.sakana.ai/v1').replace(/\/$/, '');
    const sysPrompt = localStorage.getItem('fugu_sys_prompt') || '';

    // 引用テキストがあれば先頭に付加
    const fullText = quotedText ? `> ${quotedText}\n\n${text}` : text;

    const snapImages = [...pendingImages];
    let userContent;
    if (snapImages.length > 0) {
      userContent = [];
      snapImages.forEach(img => { userContent.push({ type: 'image_url', image_url: { url: `data:${img.mimeType};base64,${img.base64}` } }); });
      if (fullText) userContent.push({ type: 'text', text: fullText });
    } else { userContent = fullText; }

    messages.push({ role: 'user', content: userContent });
    appendUserBubble(fullText, snapImages);

    input.value = ''; input.style.height = 'auto';
    pendingImages = []; renderImagePreviews();
    clearQuote(); updateSendBtn();

    isLoading = true; updateSendBtn(); appendTyping();

    const reqMessages = [];
    if (sysPrompt) reqMessages.push({ role: 'system', content: sysPrompt });
    reqMessages.push(...messages);

    try {
      const res = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model, messages: reqMessages }),
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '（応答なし）';
      messages.push({ role: 'assistant', content: reply });
      removeTyping(); appendAIBubble(reply, model);
      saveCurrentChat();
    } catch (e) {
      removeTyping(); messages.pop(); appendError(e.message);
    } finally {
      isLoading = false; updateSendBtn();
    }
  }

  // ── Quote reply ──
  let quotedText = '';
  const quotePopup = document.getElementById('quote-popup');

  document.addEventListener('mouseup', (e) => {
    // Don't show on input area
    if (document.getElementById('input-area').contains(e.target)) return;
    if (quotePopup.contains(e.target)) return;
    setTimeout(() => {
      const sel = window.getSelection();
      const text = sel ? sel.toString().trim() : '';
      if (!text || text.length < 2) { quotePopup.classList.remove('visible'); return; }
      // position popup near selection
      const range = sel.getRangeAt(0);
      const rect = range.getBoundingClientRect();
      quotePopup.style.top = (rect.top + window.scrollY - 44) + 'px';
      quotePopup.style.left = Math.max(8, rect.left + rect.width / 2 - 40) + 'px';
      quotePopup.classList.add('visible');
    }, 10);
  });

  document.addEventListener('mousedown', (e) => {
    if (!quotePopup.contains(e.target)) quotePopup.classList.remove('visible');
  });

  function quoteSelected() {
    const sel = window.getSelection();
    quotedText = sel ? sel.toString().trim() : '';
    quotePopup.classList.remove('visible');
    if (!quotedText) return;
    document.getElementById('quote-text').textContent = quotedText;
    document.getElementById('quote-preview').classList.add('visible');
    document.getElementById('user-input').focus();
    updateSendBtn();
  }

  function clearQuote() {
    quotedText = '';
    document.getElementById('quote-preview').classList.remove('visible');
    updateSendBtn();
  }

  // ── Drag & Drop ──
  let dragCounter = 0;
  const dropOverlay = document.getElementById('drop-overlay');

  function hasImageDrag(e) {
    if (!e.dataTransfer) return false;
    // Files from explorer/download bar
    if (e.dataTransfer.types.includes('Files')) return true;
    // URL drag (Chrome download bar drops as text/uri-list)
    if (e.dataTransfer.types.includes('text/uri-list')) return true;
    return false;
  }

  function addImageFromUrl(url) {
    // fetch the image URL and convert to base64
    fetch(url)
      .then(r => r.blob())
      .then(blob => {
        if (!blob.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const dataUrl = ev.target.result;
          pendingImages.push({ id: Date.now() + Math.random(), base64: dataUrl.split(',')[1], mimeType: blob.type, previewUrl: dataUrl });
          renderImagePreviews(); updateSendBtn();
        };
        reader.readAsDataURL(blob);
      }).catch(() => {});
  }

  window.addEventListener('dragenter', (e) => {
    if (!hasImageDrag(e)) return;
    e.preventDefault();
    dragCounter++;
    dropOverlay.classList.add('active');
  }, true);

  window.addEventListener('dragleave', (e) => {
    if (!hasImageDrag(e) && dragCounter === 0) return;
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) dropOverlay.classList.remove('active', 'over');
  }, true);

  window.addEventListener('dragover', (e) => {
    if (!hasImageDrag(e)) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    dropOverlay.classList.add('over');
  }, true);

  window.addEventListener('drop', (e) => {
    if (!hasImageDrag(e)) return;
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active', 'over');

    // Try files first (Explorer / download bar file drop)
    const files = e.dataTransfer.files ? Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')) : [];
    if (files.length > 0) {
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          const dataUrl = ev.target.result;
          pendingImages.push({ id: Date.now() + Math.random(), base64: dataUrl.split(',')[1], mimeType: file.type, previewUrl: dataUrl });
          renderImagePreviews(); updateSendBtn();
        };
        reader.readAsDataURL(file);
      });
      return;
    }

    // Fallback: URI list (Chrome download bar image link)
    const uriList = e.dataTransfer.getData('text/uri-list');
    if (uriList) {
      uriList.split('\n').map(u => u.trim()).filter(u => u && !u.startsWith('#')).forEach(addImageFromUrl);
      return;
    }

    // Fallback: plain text URL
    const text = e.dataTransfer.getData('text/plain');
    if (text && /^https?:\/\//.test(text)) addImageFromUrl(text);
  }, true);

  // ── Init ──
  // リロード時: 最後に開いていたチャットを復元
  const lastId = localStorage.getItem('fugu_last_chat_id');
  const allChatsOnLoad = loadAllChats();
  const lastChat = lastId ? allChatsOnLoad.find(c => c.id === lastId) : null;
  if (lastChat) {
    currentChatId = lastChat.id;
    messages = lastChat.messages;
    if (lastChat.model) { model = lastChat.model; document.getElementById('hdr-model-name').textContent = model === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu'; }
    rerenderMessages();
  } else if (allChatsOnLoad.length > 0) {
    // 最新チャットを開く
    const newest = allChatsOnLoad[0];
    currentChatId = newest.id;
    messages = newest.messages;
    if (newest.model) { model = newest.model; document.getElementById('hdr-model-name').textContent = model === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu'; }
    rerenderMessages();
  } else {
    currentChatId = 'chat_' + Date.now();
  }
  // open sidebar by default on desktop
  if (isDesktop()) {
    document.getElementById('sidebar-overlay').classList.add('open');
    renderHistoryList();
  }
  updateSendBtn();
  document.getElementById('user-input').addEventListener('input', updateSendBtn);
  document.addEventListener('touchstart', function(e) {
    const input = document.getElementById('user-input');
    const area = document.getElementById('input-area');
    if (document.activeElement === input && !area.contains(e.target)) input.blur();
  }, { passive: true });
</script>


</div><!-- /desktop-root -->
</body>
