<script>
  // ── State ──
  let model = 'fugu';
  let messages = [];
  let isLoading = false;
  let pendingImages = [];
  let currentChatId = null;
  let isIncognito = false;

  // ── History storage ──
  function loadAllChats() {
    try { return JSON.parse(localStorage.getItem('fugu_chats') || '[]'); } catch { return []; }
  }
  function saveAllChats(chats) {
    localStorage.setItem('fugu_chats', JSON.stringify(chats));
  }
  function saveCurrentChat() {
    if (messages.length === 0 || isIncognito) return;
    const chats = loadAllChats();
    const idx = chats.findIndex(c => c.id === currentChatId);
    const firstUserMsg = messages.find(m => m.role === 'user');
    let title = '新しい会話';
    if (firstUserMsg) {
      const content = typeof firstUserMsg.content === 'string'
        ? firstUserMsg.content
        : (firstUserMsg.content.find(b => b.type === 'text')?.text || '画像のみ');
      title = content.slice(0, 40) + (content.length > 40 ? '…' : '');
    }
    const entry = { id: currentChatId, title, updatedAt: Date.now(), model, messages };
    if (idx >= 0) chats[idx] = entry;
    else chats.unshift(entry);
    chats.sort((a, b) => b.updatedAt - a.updatedAt);
    saveAllChats(chats);
    localStorage.setItem('fugu_last_chat_id', currentChatId);
    saveToFirebase();
  }
  function deleteChatById(id) {
    const chats = loadAllChats().filter(c => c.id !== id);
    saveAllChats(chats);
    deleteFromFirebase(id);
    if (id === currentChatId) newChat();
    renderHistoryList();
  }

  // ── Incognito ──
  function toggleIncognito() {
    isIncognito = !isIncognito;
    document.body.classList.toggle('incognito', isIncognito);
    const btn = document.getElementById('incognito-btn');
    btn.classList.toggle('incognito-active', isIncognito);
    const svg = btn.querySelector('.incognito-svg');
    if (svg) svg.style.opacity = isIncognito ? '1' : '0.55';
    document.getElementById('incognito-banner').classList.toggle('visible', isIncognito);
    
    if (isIncognito) {
      saveCurrentChat();
      currentChatId = 'incognito_' + Date.now();
      messages = [];
      pendingImages = [];
      renderImagePreviews();
      document.getElementById('messages').querySelectorAll('.msg, .error-msg').forEach(el => el.remove());
      document.getElementById('empty').style.display = 'flex';
      updateSendBtn();
    } else {
      currentChatId = 'chat_' + Date.now();
      messages = [];
      pendingImages = [];
      renderImagePreviews();
      document.getElementById('messages').querySelectorAll('.msg, .error-msg').forEach(el => el.remove());
      document.getElementById('empty').style.display = 'flex';
      updateSendBtn();
    }
  }

  // ── Sidebar ──
  function isDesktop() { return window.innerWidth >= 768; }
  function openSidebar() {
    renderHistoryList();
    document.getElementById('sidebar-overlay').classList.add('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
  function toggleSidebar() {
    const overlay = document.getElementById('sidebar-overlay');
    if (overlay.classList.contains('open')) {
      closeSidebar();
    } else {
      openSidebar();
    }
  }

  function renderHistoryList() {
    const container = document.getElementById('history-list');
    const chats = loadAllChats().sort((a, b) => b.updatedAt - a.updatedAt);
    if (chats.length === 0) {
      container.innerHTML = '<div class="empty-history"><div class="eh-icon">💬</div>まだ会話がありません</div>';
      return;
    }
    const now = new Date();
    const groups = { '今日': [], '昨日': [], '過去7日': [], 'それ以前': [] };
    chats.forEach(c => {
      const d = new Date(c.updatedAt);
      const diffDays = Math.floor((now - d) / 86400000);
      if (diffDays === 0) groups['今日'].push(c);
      else if (diffDays === 1) groups['昨日'].push(c);
      else if (diffDays < 7) groups['過去7日'].push(c);
      else groups['それ以前'].push(c);
    });

    container.innerHTML = '';
    for (const [label, items] of Object.entries(groups)) {
      if (items.length === 0) continue;
      const sec = document.createElement('div');
      sec.className = 'history-section-label';
      sec.textContent = label;
      container.appendChild(sec);
      items.forEach(c => {
        const item = document.createElement('div');
        item.className = 'history-item' + (c.id === currentChatId ? ' active' : '');
        item.innerHTML = `
          <div class="hi-text">
            <div class="hi-title">${escHtml(c.title)}</div>
            <div class="hi-date">${formatDate(c.updatedAt)}</div>
          </div>
        `;
        const delBtn = document.createElement('button');
        delBtn.className = 'hi-delete';
        delBtn.textContent = '🗑';
        delBtn.addEventListener('click', e => { e.stopPropagation(); deleteChatById(c.id); });
        item.appendChild(delBtn);
        item.addEventListener('click', () => loadChat(c.id));
        container.appendChild(item);
      });
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatDate(ts) {
    const d = new Date(ts);
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    return `${d.getMonth()+1}/${d.getDate()} ${h}:${m}`;
  }

  // 💡 トークン溢れを防ぐため、API送信用のメッセージから過去の巨大なBase64画像を除去・クレンジングする関数
  function prepareCleanMessages(sysPrompt) {
    const reqMessages = [];
    
    // システムプロンプトと記憶の結合
    const memories = loadMemories();
    let combinedSys = sysPrompt || '';
    if (memories.length > 0 && !isIncognito) {
      const memBlock = '【記憶】\n' + memories.map((m, i) => `${i+1}. ${m}`).join('\n');
      combinedSys = combinedSys ? combinedSys + '\n\n' + memBlock : memBlock;
    }
    if (combinedSys) {
      reqMessages.push({ role: 'system', content: combinedSys });
    }

    // 過去ログのコピーを作成し、直近以外の古いメッセージからBase64画像データを消去してテキストのみにする
    messages.forEach((m, idx) => {
      // 最新のユーザーメッセージ（配列の最後、または最後から2番目のアシスタントの手前）は画像を保持
      const isLatestUserMessage = (m.role === 'user' && idx >= messages.length - 2);

      if (typeof m.content === 'string') {
        reqMessages.push({ role: m.role, content: m.content });
      } else if (Array.isArray(m.content)) {
        if (isLatestUserMessage) {
          // 直近の画像はそのまま送信
          reqMessages.push({ role: m.role, content: m.content });
        } else {
          // 過去の会話の画像はBase64をAPIに再送しない（トークン超節約）
          const textBody = m.content.find(b => b.type === 'text')?.text || '（画像メッセージ）';
          reqMessages.push({ role: m.role, content: `[過去に送信された画像] ${textBody}` });
        }
      }
    });

    return reqMessages;
  }

  function loadChat(id) {
    const chats = loadAllChats();
    const chat = chats.find(c => c.id === id);
    if (!chat) return;
    currentChatId = chat.id;
    messages = chat.messages;
    if (chat.model) { model = chat.model; document.getElementById('hdr-model-name').textContent = model === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu'; }
    localStorage.setItem('fugu_last_chat_id', currentChatId);
    rerenderMessages();
    closeSidebar();
  }

  function rerenderMessages() {
    const container = document.getElementById('messages');
    container.querySelectorAll('.msg, .error-msg').forEach(el => el.remove());
    const empty = document.getElementById('empty');
    if (messages.length === 0) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';
    messages.forEach(m => {
      if (m.role === 'user') {
        const images = [];
        let text = '';
        if (typeof m.content === 'string') { text = m.content; }
        else if (Array.isArray(m.content)) {
          m.content.forEach(b => {
            if (b.type === 'text') text = b.text;
            if (b.type === 'image_url') images.push({ previewUrl: b.image_url.url });
          });
        }
        appendUserBubble(text, images, false);
      } else if (m.role === 'assistant') {
        appendAIBubble(typeof m.content === 'string' ? m.content : '', m.model || model, false);
      }
    });

    requestAnimationFrame(() => {
      const container = document.getElementById('messages');
      container.scrollTop = container.scrollHeight;
    });
    updateSendBtn();
  }

  function newChat() {
    saveCurrentChat();
    currentChatId = 'chat_' + Date.now();
    messages = [];
    pendingImages = [];
    renderImagePreviews();
    document.getElementById('messages').querySelectorAll('.msg, .error-msg').forEach(el => el.remove());
    document.getElementById('empty').style.display = 'flex';
    updateSendBtn();
    closeSidebar();
  }

  function openModelPicker() {
    document.getElementById('opt-fugu').classList.toggle('selected', model === 'fugu');
    document.getElementById('opt-ultra').classList.toggle('selected', model === 'fugu-ultra');
    document.getElementById('model-sheet').classList.add('open');
  }
  function selectModel(m) {
    model = m;
    document.getElementById('hdr-model-name').textContent = m === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu';
    closeSheet('model-sheet');
  }

  function openSettings() {
    document.getElementById('api-key-input').value = localStorage.getItem('fugu_api_key') || '';
    document.getElementById('base-url-input').value = localStorage.getItem('fugu_base_url') || '';
    document.getElementById('sys-prompt-input').value = localStorage.getItem('fugu_sys_prompt') || '';
    document.getElementById('fb-api-key-input').value = localStorage.getItem('fb_api_key') || '';
    document.getElementById('fb-auth-domain-input').value = localStorage.getItem('fb_auth_domain') || '';
    document.getElementById('fb-project-id-input').value = localStorage.getItem('fb_project_id') || '';
    document.getElementById('fb-app-id-input').value = localStorage.getItem('fb_app_id') || '';
    renderMemoryList();
    document.getElementById('settings-sheet').classList.add('open');
  }
  function saveSettings() {
    const key = document.getElementById('api-key-input').value.trim();
    const url = document.getElementById('base-url-input').value.trim();
    const sys = document.getElementById('sys-prompt-input').value.trim();
    if (key) localStorage.setItem('fugu_api_key', key);
    if (url) localStorage.setItem('fugu_base_url', url);
    localStorage.setItem('fugu_sys_prompt', sys);

    const fbKey = document.getElementById('fb-api-key-input').value.trim();
    const fbDomain = document.getElementById('fb-auth-domain-input').value.trim();
    const fbProject = document.getElementById('fb-project-id-input').value.trim();
    const fbAppId = document.getElementById('fb-app-id-input').value.trim();
    if (fbKey) localStorage.setItem('fb_api_key', fbKey);
    if (fbDomain) localStorage.setItem('fb_auth_domain', fbDomain);
    if (fbProject) localStorage.setItem('fb_project_id', fbProject);
    if (fbAppId) localStorage.setItem('fb_app_id', fbAppId);

    if (!firebaseReady && fbKey && fbProject) initFirebase();
    if (firebaseReady && currentUser) saveToFirebase();

    closeSheet('settings-sheet');
    updateSendBtn();
  }

  function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
  function closeOnOverlay(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 260) + 'px';
    updateSendBtn();
  }
  function updateSendBtn() {
    const val = document.getElementById('user-input').value.trim();
    const hasKey = !!localStorage.getItem('fugu_api_key');
    document.getElementById('send-btn').disabled = (!val && pendingImages.length === 0 && !quotedText) || !hasKey || isLoading;
  }
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!document.getElementById('send-btn').disabled) sendMessage();
    }
  }

  function handleFileSelect(e) {
    Array.from(e.target.files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        pendingImages.push({ id: Date.now() + Math.random(), base64: dataUrl.split(',')[1], mimeType: file.type, previewUrl: dataUrl });
        renderImagePreviews(); updateSendBtn();
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }
  function removeImage(id) {
    pendingImages = pendingImages.filter(img => img.id !== id);
    renderImagePreviews(); updateSendBtn();
  }
  function renderImagePreviews() {
    const bar = document.getElementById('img-preview-bar');
    bar.innerHTML = '';
    if (pendingImages.length === 0) { bar.classList.remove('has-images'); return; }
    bar.classList.add('has-images');
    pendingImages.forEach(img => {
      const thumb = document.createElement('div'); thumb.className = 'img-thumb';
      const im = document.createElement('img'); im.src = img.previewUrl;
      im.onclick = (e) => { e.stopPropagation(); openLightbox(img.previewUrl); };
      const btn = document.createElement('button'); btn.className = 'remove-img'; btn.textContent = '✕';
      btn.onclick = () => removeImage(img.id);
      thumb.appendChild(im); thumb.appendChild(btn); bar.appendChild(thumb);
    });
  }

  function smartScroll() {
    const container = document.getElementById('messages');
    const threshold = 120;
    const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
    if (isNearBottom) container.scrollTop = container.scrollHeight;
  }
  function fmtTime(ts) {
    const d = new Date(ts);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function appendUserBubble(text, images, animate = true) {
    const container = document.getElementById('messages');
    document.getElementById('empty').style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg user'; if (!animate) div.style.animation = 'none';

    const bubble = document.createElement('div'); bubble.className = 'bubble';
    images.forEach(img => {
      const im = document.createElement('img'); im.src = img.previewUrl; im.className = 'bubble-img';
      im.onclick = () => openLightbox(img.previewUrl);
      bubble.appendChild(im);
    });
    if (text) { const t = document.createElement('span'); t.textContent = text; bubble.appendChild(t); }

    const meta = document.createElement('div'); meta.className = 'msg-meta';
    const time = document.createElement('span'); time.className = 'msg-time'; time.textContent = fmtTime(Date.now());
    const actions = document.createElement('div'); actions.className = 'msg-actions';

    const reloadBtn = document.createElement('button'); reloadBtn.className = 'msg-action-btn';
    reloadBtn.title = '再送'; reloadBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;
    reloadBtn.onclick = () => retrySend(div);

    const editBtn = document.createElement('button'); editBtn.className = 'msg-action-btn';
    editBtn.title = '編集'; editBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    editBtn.onclick = () => editUserMsg(div, text);

    const copyBtn = document.createElement('button'); copyBtn.className = 'msg-action-btn';
    copyBtn.title = 'コピー'; copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    copyBtn.onclick = () => copyText(text, copyBtn);

    actions.appendChild(reloadBtn); actions.appendChild(editBtn); actions.appendChild(copyBtn);
    meta.appendChild(time); meta.appendChild(actions);
    div.appendChild(bubble); div.appendChild(meta);
    container.appendChild(div);
    if (animate) requestAnimationFrame(() => { div.scrollIntoView({ block: 'start', behavior: 'smooth' }); });
  }

  function appendAIBubble(text, modelUsed, animate = true) {
    const container = document.getElementById('messages');
    document.getElementById('empty').style.display = 'none';
    const div = document.createElement('div'); div.className = 'msg ai'; if (!animate) div.style.animation = 'none';
    const name = document.createElement('div'); name.className = 'ai-name';
    name.innerHTML = modelUsed === 'fugu-ultra' ? '⚡ Fugu Ultra' : `<svg width="16" height="16" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 24 C10 14 18 8 28 10 C36 12 40 18 40 24 C40 30 36 36 28 38 C18 40 10 34 10 24Z" stroke="#e53935" stroke-width="3" stroke-linejoin="round" fill="none"/><path d="M10 24 L2 16" stroke="#e53935" stroke-width="3" stroke-linecap="round"/><path d="M10 24 L2 32" stroke="#e53935" stroke-width="3" stroke-linecap="round"/><path d="M22 13 L16 35" stroke="#e53935" stroke-width="2.5" stroke-linecap="round"/><circle cx="32" cy="21" r="2.5" stroke="#e53935" stroke-width="2" fill="none"/></svg>`;
    const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;

    const meta = document.createElement('div'); meta.className = 'msg-meta';
    const time = document.createElement('span'); time.className = 'msg-time'; time.textContent = fmtTime(Date.now());
    const actions = document.createElement('div'); actions.className = 'msg-actions';

    const reloadBtn = document.createElement('button'); reloadBtn.className = 'msg-action-btn';
    reloadBtn.title = '再生成'; reloadBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;
    reloadBtn.onclick = () => regenerate();

    const copyBtn = document.createElement('button'); copyBtn.className = 'msg-action-btn';
    copyBtn.title = 'コピー'; copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    copyBtn.onclick = () => copyText(text, copyBtn);

    actions.appendChild(reloadBtn); actions.appendChild(copyBtn);
    meta.appendChild(time); meta.appendChild(actions);
    div.appendChild(name); div.appendChild(bubble); div.appendChild(meta);
    container.appendChild(div);
  }

  function appendTyping() {
    const container = document.getElementById('messages');
    document.getElementById('empty').style.display = 'none';
    const div = document.createElement('div'); div.className = 'msg ai'; div.id = 'typing-msg';
    const name = document.createElement('div'); name.className = 'ai-name';
    name.innerHTML = model === 'fugu-ultra' ? '⚡ Fugu Ultra' : `<svg width="16" height="16" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 24 C10 14 18 8 28 10 C36 12 40 18 40 24 C40 30 36 36 28 38 C18 40 10 34 10 24Z" stroke="#e53935" stroke-width="3" stroke-linejoin="round" fill="none"/><path d="M10 24 L2 16" stroke="#e53935" stroke-width="3" stroke-linecap="round"/><path d="M10 24 L2 32" stroke="#e53935" stroke-width="3" stroke-linecap="round"/><path d="M22 13 L16 35" stroke="#e53935" stroke-width="2.5" stroke-linecap="round"/><circle cx="32" cy="21" r="2.5" stroke="#e53935" stroke-width="2" fill="none"/></svg>`;
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    div.appendChild(name); div.appendChild(bubble); container.appendChild(div);
  }
  function removeTyping() { const el = document.getElementById('typing-msg'); if (el) el.remove(); }
  function appendError(msg) {
    const container = document.getElementById('messages');
    const div = document.createElement('div'); div.className = 'error-msg';
    div.textContent = '⚠️ ' + msg; container.appendChild(div);
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 1500);
    });
  }

  function editUserMsg(div, oldText) {
    const allUserDivs = Array.from(document.querySelectorAll('.msg.user'));
    const idx = allUserDivs.indexOf(div);
    if (idx < 0) return;
    const input = document.getElementById('user-input');
    input.value = oldText;
    autoResize(input);
    input.focus();
    const msgIdx = messages.findIndex((m, i) => {
      const userMsgs = messages.slice(0, i + 1).filter(x => x.role === 'user');
      return userMsgs.length === idx + 1 && m.role === 'user';
    });
    if (msgIdx >= 0) messages.splice(msgIdx);
    const container = document.getElementById('messages');
    const allMsgs = Array.from(container.querySelectorAll('.msg, .error-msg'));
    let found = false;
    allMsgs.forEach(el => {
      if (el === div) found = true;
      if (found) el.remove();
    });
    if (messages.length === 0) document.getElementById('empty').style.display = 'flex';
    updateSendBtn();
  }

  function retrySend(div) {
    const lastUser = [...messages].reverse().find(m => m.role === 'user');
    if (!lastUser) return;
    if (messages[messages.length - 1]?.role === 'assistant') {
      messages.pop();
      const container = document.getElementById('messages');
      const lastAI = [...container.querySelectorAll('.msg.ai')].pop();
      if (lastAI) lastAI.remove();
    }
    document.querySelectorAll('.error-msg').forEach(e => e.remove());
    resendLastUserMessage();
  }

  async function resendLastUserMessage() {
    const apiKey = localStorage.getItem('fugu_api_key');
    const baseUrl = (localStorage.getItem('fugu_base_url') || 'https://api.sakana.ai/v1').replace(/\/$/, '');
    const sysPrompt = localStorage.getItem('fugu_sys_prompt') || '';
    
    // 💡 直近のメッセージテキストを取得して記憶判定
    const lastUser = [...messages].reverse().find(m => m.role === 'user');
    let checkText = '';
    if (lastUser) {
      checkText = typeof lastUser.content === 'string' 
        ? lastUser.content 
        : (lastUser.content.find(b => b.type === 'text')?.text || '');
    }

    isLoading = true; updateSendBtn(); appendTyping();
    
    if (checkText && detectMemoryIntent(checkText)) {
      const memContent = extractMemoryContent(checkText);
      if (memContent) addMemory(memContent);
    }

    // 💡 トークン節約ロジックを通したメッセージを生成
    const reqMessages = prepareCleanMessages(sysPrompt);

    try {
      const res = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model, messages: reqMessages }),
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '（応答なし）';
      messages.push({ role: 'assistant', content: reply });
      removeTyping(); appendAIBubble(reply, model);
      saveCurrentChat();
    } catch (e) {
      removeTyping(); appendError(e.message);
    } finally {
      isLoading = false; updateSendBtn();
    }
  }

  function regenerate() {
    if (messages[messages.length - 1]?.role === 'assistant') {
      messages.pop();
      const container = document.getElementById('messages');
      const lastAI = [...container.querySelectorAll('.msg.ai')].pop();
      if (lastAI) lastAI.remove();
    }
    document.querySelectorAll('.error-msg').forEach(e => e.remove());
    resendLastUserMessage();
  }

  // ── Memory ──
  function loadMemories() {
    try { return JSON.parse(localStorage.getItem('fugu_memories') || '[]'); } catch { return []; }
  }
  function saveMemories(mems) {
    localStorage.setItem('fugu_memories', JSON.stringify(mems));
  }
  function addMemory(text) {
    const mems = loadMemories();
    if (mems.includes(text)) return;
    mems.unshift(text);
    if (mems.length > 50) mems.pop();
    saveMemories(mems);
    showMemoryToast();
    if (currentUser && firebaseReady && !isIncognito) {
      window._fbSetDoc(window._fbDoc(window._fbDb, 'users', currentUser.uid, 'data', 'memories'), { list: mems }).catch(()=>{});
    }
  }
  function deleteMemory(idx) {
    const mems = loadMemories();
    mems.splice(idx, 1);
    saveMemories(mems);
    renderMemoryList();
  }
  function renderMemoryList() {
    const container = document.getElementById('memory-list');
    if (!container) return;
    const mems = loadMemories();
    if (mems.length === 0) {
      container.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:4px 0">まだ記憶がありません</div>';
      return;
    }
    container.innerHTML = '';
    mems.forEach((m, i) => {
      const div = document.createElement('div'); div.className = 'memory-item';
      const span = document.createElement('span');
      span.className = 'mi-text';
      span.contentEditable = 'true';
      span.textContent = m;
      span.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
        if (e.key === 'Escape') { span.textContent = m; span.blur(); }
      });
      span.addEventListener('blur', () => {
        const newText = span.textContent.trim();
        if (newText && newText !== m) {
          const mems2 = loadMemories();
          mems2[i] = newText;
          saveMemories(mems2);
        } else if (!newText) {
          deleteMemory(i);
        }
      });

      const acts = document.createElement('div'); acts.className = 'mi-actions';
      const delBtn = document.createElement('button');
      delBtn.className = 'mi-btn del'; delBtn.textContent = '✕'; delBtn.title = '削除';
      delBtn.onclick = () => deleteMemory(i);

      acts.appendChild(delBtn);
      div.appendChild(span); div.appendChild(acts);
      container.appendChild(div);
    });
  }
  function showMemoryToast() {
    const toast = document.getElementById('memory-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function detectMemoryIntent(text) {
    return /覚えてて[。！!]?$/.test(text) ||
           /覚えておいて[。！!]?$/.test(text) ||
           /記憶して[。！!]?$/.test(text);
  }

  function extractMemoryContent(text) {
    return text
      .replace(/[  ]*覚えてて[。！!]?$/g, '')
      .replace(/[  ]*覚えておいて[。！!]?$/g, '')
      .replace(/[  ]*記憶して[。！!]?$/g, '')
      .trim();
  }

  // ── Send ──
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if ((!text && pendingImages.length === 0) || isLoading) return;

    const apiKey = localStorage.getItem('fugu_api_key');
    const baseUrl = (localStorage.getItem('fugu_base_url') || 'https://api.sakana.ai/v1').replace(/\/$/, '');
    const sysPrompt = localStorage.getItem('fugu_sys_prompt') || '';

    const fullText = quotedText ? `> ${quotedText}\n\n${text}` : text;

    const snapImages = [...pendingImages];
    let userContent;
    if (snapImages.length > 0) {
      userContent = [];
      snapImages.forEach(img => { userContent.push({ type: 'image_url', image_url: { url: `data:${img.mimeType};base64,${img.base64}` } }); });
      if (fullText) userContent.push({ type: 'text', text: fullText });
    } else { userContent = fullText; }

    messages.push({ role: 'user', content: userContent });
    appendUserBubble(fullText, snapImages);

    input.value = ''; input.style.height = 'auto';
    pendingImages = []; renderImagePreviews();
    clearQuote(); updateSendBtn();

    isLoading = true; updateSendBtn(); appendTyping();

    if (detectMemoryIntent(fullText)) {
      const memContent = extractMemoryContent(fullText);
      if (memContent) addMemory(memContent);
    }

    // 💡 トークン節約ロジックを通したメッセージを生成
    const reqMessages = prepareCleanMessages(sysPrompt);

    try {
      const res = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model, messages: reqMessages }),
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '（応答なし）';
      messages.push({ role: 'assistant', content: reply });
      removeTyping(); appendAIBubble(reply, model);
      saveCurrentChat();
    } catch (e) {
      removeTyping(); messages.pop(); appendError(e.message);
    } finally {
      isLoading = false; updateSendBtn();
    }
  }

  // ── Quote reply ──
  let quotedText = '';
  const quotePopup = document.getElementById('quote-popup');

  document.addEventListener('mouseup', (e) => {
    if (document.getElementById('input-area').contains(e.target)) return;
    if (quotePopup.contains(e.target)) return;
    setTimeout(() => {
      const sel = window.getSelection();
      const text = sel ? sel.toString().trim() : '';
      if (!text || text.length < 2) { quotePopup.classList.remove('visible'); return; }
      const range = sel.getRangeAt(0);
      const rect = range.getBoundingClientRect();
      quotePopup.style.top = (rect.top + window.scrollY - 44) + 'px';
      quotePopup.style.left = Math.max(8, rect.left + rect.width / 2 - 40) + 'px';
      quotePopup.classList.add('visible');
    }, 10);
  });

  document.addEventListener('mousedown', (e) => {
    if (!quotePopup.contains(e.target)) quotePopup.classList.remove('visible');
  });

  function quoteSelected() {
    const sel = window.getSelection();
    quotedText = sel ? sel.toString().trim() : '';
    quotePopup.classList.remove('visible');
    if (!quotedText) return;
    document.getElementById('quote-text').textContent = quotedText;
    document.getElementById('quote-preview').classList.add('visible');
    document.getElementById('user-input').focus();
    updateSendBtn();
  }

  function clearQuote() {
    quotedText = '';
    document.getElementById('quote-preview').classList.remove('visible');
    updateSendBtn();
  }

  // ── Drag & Drop ──
  let dragCounter = 0;
  const dropOverlay = document.getElementById('drop-overlay');

  function hasImageDrag(e) {
    if (!e.dataTransfer) return false;
    if (e.dataTransfer.types.includes('Files')) return true;
    if (e.dataTransfer.types.includes('text/uri-list')) return true;
    return false;
  }

  function addImageFromUrl(url) {
    fetch(url)
      .then(r => r.blob())
      .then(blob => {
        if (!blob.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const dataUrl = ev.target.result;
          pendingImages.push({ id: Date.now() + Math.random(), base64: dataUrl.split(',')[1], mimeType: blob.type, previewUrl: dataUrl });
          renderImagePreviews(); updateSendBtn();
        };
        reader.readAsDataURL(blob);
      }).catch(() => {});
  }

  window.addEventListener('dragenter', (e) => {
    if (!hasImageDrag(e)) return;
    e.preventDefault();
    dragCounter++;
    dropOverlay.classList.add('active');
  }, true);

  window.addEventListener('dragleave', (e) => {
    if (!hasImageDrag(e) && dragCounter === 0) return;
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) dropOverlay.classList.remove('active', 'over');
  }, true);

  window.addEventListener('dragover', (e) => {
    if (!hasImageDrag(e)) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    dropOverlay.classList.add('over');
  }, true);

  window.addEventListener('drop', (e) => {
    if (!hasImageDrag(e)) return;
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active', 'over');

    const files = e.dataTransfer.files ? Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')) : [];
    if (files.length > 0) {
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          const dataUrl = ev.target.result;
          pendingImages.push({ id: Date.now() + Math.random(), base64: dataUrl.split(',')[1], mimeType: file.type, previewUrl: dataUrl });
          renderImagePreviews(); updateSendBtn();
        };
        reader.readAsDataURL(file);
      });
      return;
    }

    const uriList = e.dataTransfer.getData('text/uri-list');
    if (uriList) {
      uriList.split('\n').map(u => u.trim()).filter(u => u && !u.startsWith('#')).forEach(addImageFromUrl);
      return;
    }

    const text = e.dataTransfer.getData('text/plain');
    if (text && /^https?:\/\//.test(text)) addImageFromUrl(text);
  }, true);

  // ── Image lightbox ──
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('img-lightbox').classList.add('open');
  }
  function closeLightbox(e) {
    if (e && e.target.tagName === 'IMG') return;
    document.getElementById('img-lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('img-lightbox').classList.remove('open');
  });

  // ── Paste image (clipboard) ──
  document.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (!file) continue;
        const reader = new FileReader();
        reader.onload = ev => {
          const dataUrl = ev.target.result;
          pendingImages.push({ id: Date.now() + Math.random(), base64: dataUrl.split(',')[1], mimeType: file.type, previewUrl: dataUrl });
          renderImagePreviews(); updateSendBtn();
        };
        reader.readAsDataURL(file);
      }
    }
  });

  // ── Firebase Auth & Sync ──
  let currentUser = null;
  let firebaseReady = false;

  function initFirebase() {
    if (!window._fbModuleReady) {
      window.addEventListener('firebase-module-ready', initFirebase, { once: true });
      return;
    }
    const cfg = getFirebaseConfig();
    if (!cfg) return;

    try {
      const app = window._fbFns.initializeApp(cfg, 'fugu-chat');
      const auth = window._fbFns.getAuth(app);
      const db = window._fbFns.getFirestore(app);

      window._fbAuth = auth;
      window._fbDb = db;
      window._fbGoogleProvider = new window._fbFns.GoogleAuthProvider();
      window._fbSignInWithRedirect = window._fbFns.signInWithRedirect;
      window._fbGetRedirectResult = window._fbFns.getRedirectResult;
      window._fbSignOut = window._fbFns.signOut;
      window._fbOnAuthStateChanged = window._fbFns.onAuthStateChanged;
      window._fbDoc = window._fbFns.doc;
      window._fbSetDoc = window._fbFns.setDoc;
      window._fbGetDoc = window._fbFns.getDoc;
      window._fbCollection = window._fbFns.collection;
      window._fbGetDocs = window._fbFns.getDocs;
      window._fbDeleteDoc = window._fbFns.deleteDoc;
      firebaseReady = true;

      window._fbFns.getRedirectResult(auth).then(result => {
        if (result?.user) {
          currentUser = result.user;
          updateAuthUI(result.user);
          setSyncStatus('syncing', '同期中...');
          syncFromFirebase().then(() => {
            setSyncStatus('synced', '✓ 同期済み');
            setTimeout(() => setSyncStatus('', ''), 3000);
          });
        }
      }).catch(e => console.error('Redirect result error:', e));

      window._fbFns.onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        updateAuthUI(user);
        if (user) {
          setSyncStatus('syncing', '同期中...');
          await syncFromFirebase();
          setSyncStatus('synced', '✓ 同期済み');
          setTimeout(() => setSyncStatus('', ''), 3000);
        }
      });
    } catch(e) {
      console.error('Firebase init failed:', e);
      setSyncStatus('', 'Firebase設定エラー');
    }
  }

  function getFirebaseConfig() {
    const apiKey = localStorage.getItem('fb_api_key');
    const authDomain = localStorage.getItem('fb_auth_domain');
    const projectId = localStorage.getItem('fb_project_id');
    const appId = localStorage.getItem('fb_app_id');
    if (!apiKey || !projectId) return null;
    return { apiKey, authDomain, projectId, appId,
      storageBucket: localStorage.getItem('fb_storage_bucket') || '',
      messagingSenderId: localStorage.getItem('fb_messaging_sender_id') || '' };
  }

  initFirebase();

  function updateAuthUI(user) {
    const loggedOut = document.getElementById('auth-logged-out');
    const loggedIn = document.getElementById('auth-logged-in');
    if (user) {
      loggedOut.style.display = 'none';
      loggedIn.style.display = 'flex';
      loggedIn.style.alignItems = 'center';
      loggedIn.style.gap = '8px';
      const avatar = document.getElementById('auth-avatar');
      const name = document.getElementById('auth-user-name');
      if (avatar) avatar.src = user.photoURL || '';
      if (name) name.textContent = user.displayName || user.email;
    } else {
      loggedOut.style.display = 'block';
      loggedIn.style.display = 'none';
    }
  }

  function setSyncStatus(type, text) {
    const el = document.getElementById('sync-indicator');
    if (el) {
      el.textContent = text;
      el.className = 'sync-indicator' + (type ? ' ' + type : '');
    }
  }

  async function signInGoogle() {
    if (!firebaseReady) return;
    try {
      setSyncStatus('syncing', 'Googleへリダイレクト中...');
      await window._fbSignInWithRedirect(window._fbAuth, window._fbGoogleProvider);
    } catch(e) {
      console.error('Login failed', e);
      setSyncStatus('', 'ログインに失敗しました');
    }
  }

  async function signOutUser() {
    if (!firebaseReady) return;
    await window._fbSignOut(window._fbAuth);
    currentUser = null;
    updateAuthUI(null);
  }

  async function syncFromFirebase() {
    if (!currentUser || !firebaseReady) return;
    const uid = currentUser.uid;
    const db = window._fbDb;
    const doc = window._fbDoc;
    const getDoc = window._fbGetDoc;
    const collection = window._fbCollection;
    const getDocs = window._fbGetDocs;

    try {
      const memDoc = await getDoc(doc(db, 'users', uid, 'data', 'memories'));
      if (memDoc.exists()) {
        localStorage.setItem('fugu_memories', JSON.stringify(memDoc.data().list || []));
      }

      const chatsSnap = await getDocs(collection(db, 'users', uid, 'chats'));
      const chats = [];
      chatsSnap.forEach(d => chats.push(d.data()));
      if (chats.length > 0) {
        chats.sort((a, b) => b.updatedAt - a.updatedAt);
        saveAllChats(chats);
        const lastId = localStorage.getItem('fugu_last_chat_id');
        const found = chats.find(c => c.id === lastId) || chats[0];
        if (found) {
          currentChatId = found.id;
          messages = found.messages;
          if (found.model) { model = found.model; document.getElementById('hdr-model-name').textContent = model === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu'; }
          rerenderMessages();
        }
        renderHistoryList();
      }
    } catch(e) { console.error('Sync from Firebase failed', e); }
  }

  async function saveToFirebase() {
    if (!currentUser || !firebaseReady || isIncognito) return;
    const uid = currentUser.uid;
    const db = window._fbDb;
    const doc = window._fbDoc;
    const setDoc = window._fbSetDoc;
    try {
      const chats = loadAllChats();
      const chat = chats.find(c => c.id === currentChatId);
      if (chat) {
        const chatToSave = {
          ...chat,
          messages: chat.messages.map(m => {
            if (typeof m.content === 'string') return m;
            const textContent = m.content.find(b => b.type === 'text');
            return { role: m.role, content: textContent ? textContent.text : '[画像]' };
          })
        };
        await setDoc(doc(db, 'users', uid, 'chats', currentChatId), chatToSave);
      }
      const mems = loadMemories();
      await setDoc(doc(db, 'users', uid, 'data', 'memories'), { list: mems });
    } catch(e) { console.error('Save to Firebase failed', e); }
  }

  async function deleteFromFirebase(chatId) {
    if (!currentUser || !firebaseReady) return;
    const uid = currentUser.uid;
    try {
      await window._fbDeleteDoc(window._fbDoc(window._fbDb, 'users', uid, 'chats', chatId));
    } catch(e) { console.error('Delete from Firebase failed', e); }
  }

  // ── Init ──
  const lastId = localStorage.getItem('fugu_last_chat_id');
  const allChatsOnLoad = loadAllChats();
  const lastChat = lastId ? allChatsOnLoad.find(c => c.id === lastId) : null;
  if (lastChat) {
    currentChatId = lastChat.id;
    messages = lastChat.messages;
    if (lastChat.model) { model = lastChat.model; document.getElementById('hdr-model-name').textContent = model === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu'; }
    rerenderMessages();
  } else if (allChatsOnLoad.length > 0) {
    const newest = allChatsOnLoad[0];
    currentChatId = newest.id;
    messages = newest.messages;
    if (newest.model) { model = newest.model; document.getElementById('hdr-model-name').textContent = model === 'fugu-ultra' ? 'Fugu Ultra' : 'Fugu'; }
    rerenderMessages();
  } else {
    currentChatId = 'chat_' + Date.now();
  }
  if (isDesktop()) {
    document.getElementById('sidebar-overlay').classList.add('open');
    renderHistoryList();
  }
  updateSendBtn();
  document.getElementById('user-input').addEventListener('input', updateSendBtn);
  document.addEventListener('touchstart', function(e) {
    const input = document.getElementById('user-input');
    const area = document.getElementById('input-area');
    if (document.activeElement === input && !area.contains(e.target)) input.blur();
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    const messages = document.getElementById('messages');
    const historyList = document.getElementById('history-list');
    const memList = document.getElementById('memory-list');
    const isScrollable = messages.contains(e.target) || historyList.contains(e.target) || (memList && memList.contains(e.target));
    if (!isScrollable) e.preventDefault();
  }, { passive: false });
</script>
